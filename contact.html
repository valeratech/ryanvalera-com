<!DOCTYPE html>

<body>

<div class="contact-shell">

    <div id="system-status">
        <span class="status-dot"></span>
        <span class="status-label">System Status</span>
        <span class="status-value">Operational</span>

    <header class="contact-header">
        <a href="index.html" class="return-link">&larr; RETURN TO SYSTEM SELECT</a>
        <h1 id="contact-title"></h1>
        <p class="contact-sub" id="contact-sub"></p>
    </header>

    <main class="contact-main">

        <div class="panel contact-panel" id="contact-panel">

            <div class="contact-name" id="contact-name"></div>
            <div class="contact-role" id="contact-role"></div>

            <div class="contact-divider"></div>

            <ul class="contact-links">
                <li class="contact-link-item" id="link-email">
                    <span class="link-label">Email</span>
                    <a href="mailto:valeraryan@gmail.com" class="link-value">valeraryan@gmail.com</a>
                </li>
                <li class="contact-link-item" id="link-linkedin">
                    <span class="link-label">LinkedIn</span>
                    <a href="https://linkedin.com/in/ryan-valera-897796210" target="_blank" rel="noopener" class="link-value">linkedin.com/in/ryan-valera-897796210</a>
                </li>
                <li class="contact-link-item" id="link-github">
                    <span class="link-label">GitHub</span>
                    <a href="https://github.com/valeratech" target="_blank" rel="noopener" class="link-value">github.com/valeratech</a>
                </li>

            </ul>

        </div>

    </main>

    <footer class="contact-footer" id="contact-footer">
        <span class="footer-item" id="footer-item-0"><a href="index.html">SYSTEM SELECT</a></span>
        <span class="footer-item footer-div" id="footer-div-0"><span>/</span></span>
        <span class="footer-item" id="footer-item-1"><a href="profile.html">PROFESSIONAL DOSSIER</a></span>
        <span class="footer-item footer-div" id="footer-div-1"><span>/</span></span>
        <span class="footer-item" id="footer-item-2"><a href="projects.html">ENGINEERING PORTAL</a></span>
        <span class="footer-item footer-div" id="footer-div-2"><span>/</span></span>
        <span class="footer-item" id="footer-item-3"><strong>CONTACT</strong></span>
    </footer>

</div>

<script src="assets/js/contact.js?v=1.3.0"></script>
